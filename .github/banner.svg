<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">a11y.quest</title>
  <desc id="desc">128 questions to level up your accessibility game.</desc>

  <!-- Card: warm cream is the primary brand identity, framed with an ink border like the in-app cards. -->
  <rect x="1.5" y="1.5" width="1277" height="297" rx="26" fill="#fbf4e6" stroke="#1f1a2e" stroke-width="3" />

  <!-- Decorative "quest" sparks, top-right, balancing the left-weighted text. Purely ornamental. -->
  <g aria-hidden="true">
    <g transform="translate(1128.2 42) scale(1.9)"><path fill="#ffc233" d="M22 0l6 14 16 6-16 6-6 14-6-14-16-6 16-6z" /></g>
    <g transform="translate(1194.7 127) scale(1.15)"><path fill="#0e7c71" d="M22 0l6 14 16 6-16 6-6 14-6-14-16-6 16-6z" /></g>
    <g transform="translate(1130.2 182) scale(0.9)"><path fill="#6b3fa0" d="M22 0l6 14 16 6-16 6-6 14-6-14-16-6 16-6z" /></g>
  </g>

  <!-- Logo tile (same construction as favicon.svg), 160px, vertically centred. -->
  <g transform="translate(72 70) scale(2.5)">
    <rect x="3" y="3" width="58" height="58" rx="18" fill="#FFC233" stroke="#1F1A2E" stroke-width="6" />
    <g transform="translate(16.6 18) scale(0.7)"><path fill="#1F1A2E" d="M22 0l6 14 16 6-16 6-6 14-6-14-16-6 16-6z" /></g>
  </g>

  <!-- Wordmark: ink with the coral-deep dot, matching the in-app SiteHeader. -->
  <text x="256" y="156" font-size="92" font-weight="800" letter-spacing="-1.5" fill="#1f1a2e">a11y<tspan fill="#c2381b">.</tspan>quest</text>

  <!-- Tagline -->
  <text x="258" y="204" font-size="27" font-weight="600" fill="#4a4458">128 questions to level up your accessibility game.</text>
</svg>
